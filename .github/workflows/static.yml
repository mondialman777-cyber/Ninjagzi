<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NINJAGZI</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Exo+2:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-deep: #0d0716;
      --purple-accent: #7c3aed;
      --purple-pale: #c4b5fd;
    }
    html, body { width: 100%; height: 100%; cursor: none; }
    body {
      background: var(--purple-deep);
      font-family: 'Exo 2', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
      user-select: none;
    }

    /* katana cursor */
    #katana {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 80px;
      height: 80px;
      transform-origin: 8px 8px;
    }
    body.hovering #katana .blade { filter: brightness(1.4); }

    canvas { position: fixed; inset: 0; pointer-events: none; }
    #stars     { z-index: 0; }
    #particles { z-index: 2; }

    .glow-orb { position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0; }
    .orb1 { width:500px;height:500px;top:-150px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(109,40,217,.25)0%,transparent 70%); }
    .orb2 { width:300px;height:300px;bottom:-80px;right:-80px;background:radial-gradient(circle,rgba(124,58,237,.15)0%,transparent 70%); }

    .container {
      position:relative;z-index:3;
      display:flex;flex-direction:column;
      align-items:center;text-align:center;
      padding:48px 32px;
    }
    .avatar-wrap { margin-bottom:32px;animation:float 3.5s ease-in-out infinite; }
    .avatar-ring {
      width:130px;height:130px;border-radius:50%;
      border:2px solid rgba(124,58,237,.6);
      display:flex;align-items:center;justify-content:center;
      background:rgba(124,58,237,.08);
      position:relative;overflow:hidden;
    }
    .avatar-ring::before {
      content:'';position:absolute;inset:-2px;border-radius:50%;
      border:2px solid transparent;
      background:conic-gradient(from 0deg,#7c3aed,#c4b5fd,#7c3aed) border-box;
      -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:destination-out;mask-composite:exclude;
      animation:spin 4s linear infinite;
    }
    .avatar-placeholder {
      width:110px;height:110px;border-radius:50%;
      background:rgba(109,40,217,.2);
      display:flex;align-items:center;justify-content:center;
    }
    .title {
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(42px,10vw,64px);font-weight:700;letter-spacing:6px;
      background:linear-gradient(90deg,#a78bfa,#ede9fe,#7c3aed,#c4b5fd,#a78bfa);
      background-size:300% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:shimmer 4s linear infinite;line-height:1;margin-bottom:10px;
    }
    .tagline { color:rgba(167,139,250,.5);font-size:11px;letter-spacing:5px;text-transform:uppercase;margin-bottom:44px;font-weight:300; }
    .divider { width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.6),transparent);margin-bottom:44px; }
    .buttons { display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px; }
    .btn {
      display:flex;align-items:center;gap:12px;padding:15px 28px;border-radius:50px;
      font-family:'Exo 2',sans-serif;font-size:15px;font-weight:400;letter-spacing:1px;
      text-decoration:none;color:var(--purple-pale);
      border:1px solid rgba(124,58,237,.35);background:rgba(124,58,237,.08);
      cursor:none;transition:all .25s ease;justify-content:center;
      position:relative;overflow:hidden;
    }
    .btn::before {
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(167,139,250,.1));
      opacity:0;transition:opacity .25s;border-radius:50px;
    }
    .btn:hover::before { opacity:1; }
    .btn:hover { border-color:rgba(124,58,237,.8);color:#ede9fe;transform:translateY(-3px);box-shadow:0 8px 30px rgba(109,40,217,.35); }
    .btn:active { transform:translateY(-1px) scale(.97); }
    .btn svg { width:18px;height:18px;flex-shrink:0;position:relative;z-index:1; }
    .btn span { position:relative;z-index:1; }
    .footer { margin-top:52px;color:rgba(109,40,217,.35);font-size:11px;letter-spacing:2px; }

    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes shimmer { 0%{background-position:0% center} 100%{background-position:300% center} }
    @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .fade-1{animation:fadeUp .7s ease both}
    .fade-2{animation:fadeUp .7s ease .15s both}
    .fade-3{animation:fadeUp .7s ease .3s both}
    .fade-4{animation:fadeUp .7s ease .45s both}
    .fade-5{animation:fadeUp .7s ease .55s both}
    .fade-6{animation:fadeUp .7s ease .65s both}
    .fade-7{animation:fadeUp .7s ease .75s both}
  </style>
</head>
<body>

<!-- Realistic katana SVG cursor -->
<svg id="katana" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f8fafc"/>
      <stop offset="30%"  stop-color="#cbd5e1"/>
      <stop offset="55%"  stop-color="#f1f5f9"/>
      <stop offset="80%"  stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity=".6"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e0533"/>
      <stop offset="40%"  stop-color="#3b0764"/>
      <stop offset="100%" stop-color="#1e0533"/>
    </linearGradient>
    <linearGradient id="wrapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="50%"  stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="bladeGlow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tipGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Blade (katana curved shape, tip at top-right ~72,7) ── -->
  <!-- main blade body - slightly curved katana shape -->
  <g class="blade" filter="url(#bladeGlow)">
    <!-- blade body with slight curve -->
    <path d="M 10 70 L 14 66 Q 30 50 50 30 Q 62 17 72 7 L 70 5 Q 58 14 46 27 Q 26 48 10 66 Z"
          fill="url(#bladeGrad)" stroke="none"/>
    <!-- sharp edge highlight -->
    <path d="M 72 7 Q 62 17 50 30 Q 30 50 14 66"
          fill="none" stroke="url(#edgeGrad)" stroke-width="0.8" stroke-linecap="round"/>
    <!-- fuller (blood groove) line -->
    <path d="M 68 11 Q 56 22 44 34 Q 28 51 16 63"
          fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6" stroke-linecap="round"/>
    <!-- secondary reflection -->
    <path d="M 65 14 Q 53 25 41 38 Q 27 53 17 64"
          fill="none" stroke="rgba(148,163,184,0.2)" stroke-width="0.5" stroke-linecap="round"/>
    <!-- tip glow -->
    <circle cx="71" cy="7" r="1.5" fill="white" filter="url(#tipGlow)" opacity=".9"/>
  </g>

  <!-- ── Habaki (blade collar above guard) ── -->
  <rect x="9.5" y="63" width="7" height="5" rx="1"
        transform="rotate(-45 13 65)"
        fill="#b8c1cc" stroke="#94a3b8" stroke-width=".5"/>
  <!-- habaki shine -->
  <rect x="10" y="63.5" width="3" height="4" rx=".5"
        transform="rotate(-45 13 65)"
        fill="rgba(255,255,255,0.35)"/>

  <!-- ── Tsuba (guard) - circular with details ── -->
  <g transform="translate(10,67) rotate(-45)">
    <!-- outer ring -->
    <ellipse cx="0" cy="0" rx="6" ry="5.5"
             fill="#2d1b4e" stroke="#7c3aed" stroke-width="1.2"/>
    <!-- inner detail -->
    <ellipse cx="0" cy="0" rx="3.5" ry="3"
             fill="none" stroke="#a78bfa" stroke-width=".6"/>
    <!-- cross pattern on guard -->
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#6d28d9" stroke-width=".5"/>
    <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#6d28d9" stroke-width=".5"/>
    <!-- corner dots -->
    <circle cx="4" cy="0" r=".8" fill="#c4b5fd"/>
    <circle cx="-4" cy="0" r=".8" fill="#c4b5fd"/>
    <circle cx="0" cy="3.5" r=".8" fill="#c4b5fd"/>
    <circle cx="0" cy="-3.5" r=".8" fill="#c4b5fd"/>
  </g>

  <!-- ── Handle (tsuka) with wrap pattern ── -->
  <g>
    <!-- handle core -->
    <path d="M 6 70 L 3 73 L 1 77 L 4 79 L 8 76 L 11 72 Z"
          fill="url(#handleGrad)" stroke="#3b0764" stroke-width=".5"/>
    <!-- wrap strips (diagonal bands across handle) -->
    <line x1="3.5" y1="76" x2="7.5" y2="72" stroke="url(#wrapGrad)" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
    <line x1="2.5" y1="74.5" x2="6.5" y2="70.5" stroke="url(#wrapGrad)" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
    <line x1="4.5" y1="77.5" x2="8.5" y2="73.5" stroke="url(#wrapGrad)" stroke-width="1.8" stroke-linecap="round" opacity=".9"/>
    <!-- wrap highlight -->
    <line x1="3.8" y1="76.2" x2="7.2" y2="72.8" stroke="rgba(167,139,250,.35)" stroke-width=".6" stroke-linecap="round"/>
    <line x1="2.8" y1="74.7" x2="6.2" y2="71.3" stroke="rgba(167,139,250,.35)" stroke-width=".6" stroke-linecap="round"/>
    <line x1="4.8" y1="77.7" x2="8.2" y2="74.3" stroke="rgba(167,139,250,.35)" stroke-width=".6" stroke-linecap="round"/>
  </g>

  <!-- ── Kashira (pommel) ── -->
  <ellipse cx="2.2" cy="78.5" rx="2.5" ry="2"
           transform="rotate(-45 2.2 78.5)"
           fill="#4c1d95" stroke="#7c3aed" stroke-width=".8"/>
  <ellipse cx="2.2" cy="78.5" rx="1.2" ry=".9"
           transform="rotate(-45 2.2 78.5)"
           fill="#6d28d9"/>
</svg>

<canvas id="stars"></canvas>
<canvas id="particles"></canvas>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="container">
  <div class="avatar-wrap fade-1">
    <div class="avatar-ring">
      <!-- ЗАМЕНИ на свою гифку: удали avatar-placeholder и вставь:
           <img src="твоя-гифка.gif" style="width:110px;height:110px;border-radius:50%;object-fit:cover;" alt="ninjagzi" /> -->
      <div class="avatar-placeholder">
        <svg width="56" height="56" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" fill="#1e0a3c"/>
          <path d="M20 55 Q50 20 80 55 Q65 90 35 90 Z" fill="#2d1060"/>
          <rect x="28" y="40" width="44" height="28" rx="6" fill="#3b1580"/>
          <rect x="28" y="40" width="44" height="12" rx="4" fill="#1a0840"/>
          <rect x="35" y="44" width="30" height="4" rx="2" fill="#7c3aed"/>
          <circle cx="38" cy="46" r="2.5" fill="#c4b5fd"/>
          <circle cx="62" cy="46" r="2.5" fill="#c4b5fd"/>
          <circle cx="39" cy="46" r="1" fill="#0d0716"/>
          <circle cx="63" cy="46" r="1" fill="#0d0716"/>
          <path d="M25 38 Q50 25 75 38" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round"/>
          <rect x="22" y="34" width="56" height="6" rx="3" fill="#4c1d95"/>
          <line x1="50" y1="40" x2="50" y2="34" stroke="#7c3aed" stroke-width="2"/>
        </svg>
      </div>
    </div>
  </div>

  <h1 class="title fade-2">NINJAGZI</h1>
  <p class="tagline fade-3">follow me</p>
  <div class="divider fade-3"></div>

  <div class="buttons">
    <a class="btn fade-4" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.186.006l2.86-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.492 1.009 2.448-.4.957-1.497 1.41-2.454 1.009zM17.336 8.91c0-1.666-1.356-3.02-3.021-3.02s-3.021 1.354-3.021 3.02 1.356 3.021 3.021 3.021 3.021-1.355 3.021-3.021zm-5.285.012c0-1.235 1.003-2.237 2.237-2.237 1.235 0 2.237 1.002 2.237 2.237 0 1.234-1.002 2.237-2.237 2.237-1.234 0-2.237-1.003-2.237-2.237z"/></svg>
      <span>Steam</span>
    </a>
    <a class="btn fade-5" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      <span>YouTube</span>
    </a>
    <a class="btn fade-6" href="https://t.me/MichaelexZ" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      <span>Telegram</span>
    </a>
  </div>

  <p class="footer fade-7">© 2026 NINJAGZI</p>
</div>

<script>
// ── Stars ──
const sc = document.getElementById('stars');
const sx = sc.getContext('2d');
let stars = [];
function rsz() { sc.width = innerWidth; sc.height = innerHeight; }
function ist() {
  stars = [];
  for (let i = 0; i < 120; i++) stars.push({
    x:Math.random()*sc.width, y:Math.random()*sc.height,
    r:Math.random()*1.5+.3, a:Math.random()*.6+.1,
    sp:Math.random()*.3+.05, d:Math.random()>.5?1:-1
  });
}
function dst() {
  sx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s => {
    s.a += s.sp*.015*s.d;
    if (s.a>.7||s.a<.05) s.d*=-1;
    sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sx.fillStyle=`rgba(167,139,250,${s.a})`; sx.fill();
  });
  requestAnimationFrame(dst);
}
rsz(); ist(); dst();
window.addEventListener('resize',()=>{rsz();ist();});

// ── Particles ──
const pc = document.getElementById('particles');
const px = pc.getContext('2d');
let shurikens = [], trail = [];
function rpc() { pc.width = innerWidth; pc.height = innerHeight; }
rpc(); window.addEventListener('resize', rpc);

const COLS = ['#c4b5fd','#a78bfa','#7c3aed','#ede9fe','#ddd6fe','#e9d5ff','#ffffff'];
let mx=0, my=0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  for (let i = 0; i < 2; i++) {
    const a = Math.random()*Math.PI*2, sp = Math.random()*.6+.2;
    trail.push({
      x:mx, y:my,
      vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-.2,
      r:Math.random()*1.8+.4,
      life:1, decay:Math.random()*.055+.035,
      color:COLS[Math.floor(Math.random()*COLS.length)]
    });
  }
});

// shuriken draw
function drawShuriken(ctx, x, y, size, rot, alpha, col) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.translate(x, y);
  ctx.rotate(rot);
  const blades = 4;
  for (let b = 0; b < blades; b++) {
    const a0 = (Math.PI*2/blades)*b;
    const a1 = a0 + Math.PI/4;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a0-Math.PI/10)*size*.32, Math.sin(a0-Math.PI/10)*size*.32);
    ctx.lineTo(Math.cos(a0)*size, Math.sin(a0)*size);
    ctx.lineTo(Math.cos(a0+Math.PI/10)*size*.32, Math.sin(a0+Math.PI/10)*size*.32);
    ctx.closePath();
    const g = ctx.createLinearGradient(0,0,Math.cos(a0)*size,Math.sin(a0)*size);
    g.addColorStop(0,'#fff'); g.addColorStop(.4, col); g.addColorStop(1,'#3b0764');
    ctx.fillStyle = g;
    ctx.fill();
    // edge
    ctx.strokeStyle = 'rgba(255,255,255,.3)';
    ctx.lineWidth = .5;
    ctx.stroke();
  }
  // center
  ctx.beginPath(); ctx.arc(0,0,size*.2,0,Math.PI*2);
  ctx.fillStyle='#0d0716'; ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=1; ctx.stroke();
  // inner shine
  ctx.beginPath(); ctx.arc(-size*.05,-size*.05,size*.07,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();
  ctx.restore();
}

// click = shuriken explosion
document.addEventListener('click', e => {
  const cx = e.clientX, cy = e.clientY;
  const count = 8 + Math.floor(Math.random()*5);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*.5;
    const speed = Math.random()*6+3;
    shurikens.push({
      x:cx, y:cy,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed - Math.random()*2,
      size: Math.random()*10+7,
      rotation: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-.5)*0.35,
      life:1, decay:Math.random()*.018+.01,
      gravity:.09,
      color: COLS[Math.floor(Math.random()*COLS.length)]
    });
  }
  // ring flash
  trail.push({x:cx,y:cy,vx:0,vy:0,r:20,life:.85,decay:.1,color:'#c4b5fd',ring:true});
});

function apt() {
  px.clearRect(0,0,pc.width,pc.height);
  trail = trail.filter(p=>p.life>0);
  trail.forEach(p => {
    if (p.ring) {
      px.globalAlpha = Math.max(0, p.life*.5);
      px.beginPath(); px.arc(p.x,p.y, p.r*(2-p.life)*2, 0, Math.PI*2);
      px.strokeStyle='#c4b5fd'; px.lineWidth=1.5; px.stroke();
    } else {
      px.globalAlpha = Math.max(0, p.life*.7);
      px.beginPath(); px.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      px.fillStyle=p.color; px.fill();
    }
    p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
  });
  shurikens = shurikens.filter(s=>s.life>0);
  shurikens.forEach(s => {
    drawShuriken(px, s.x, s.y, s.size, s.rotation, s.life, s.color);
    s.x+=s.vx; s.y+=s.vy;
    s.vy+=s.gravity; s.vx*=.985;
    s.rotation+=s.rotSpeed;
    s.life-=s.decay;
  });
  px.globalAlpha=1;
  requestAnimationFrame(apt);
}
apt();

// ── Katana cursor ──
const katana = document.getElementById('katana');
let curX=0, curY=0, prevX=0, prevY=0;

document.addEventListener('mousemove', e => {
  curX = e.clientX; curY = e.clientY;
  const dx = curX - prevX, dy = curY - prevY;
  prevX = curX; prevY = curY;
  const angle = Math.atan2(dy, dx) * (180/Math.PI);
  katana.style.left = curX + 'px';
  katana.style.top  = curY + 'px';
  katana.style.transform = `translate(0,0) rotate(${angle - 45}deg)`;
});

document.querySelectorAll('.btn').forEach(b => {
  b.addEventListener('mouseenter', ()=>document.body.classList.add('hovering'));
  b.addEventListener('mouseleave', ()=>document.body.classList.remove('hovering'));
});
</script>
</body>
</html>
